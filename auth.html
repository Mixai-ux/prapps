<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Prapp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --acc:#0057ff;--ink:#0d1f3c;--mid:#4a6fa5;--card:#fff;
    --bg:linear-gradient(160deg,#e8f4ff 0%,#f0f7ff 40%,#e6f0ff 100%);
  }
  body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:20px;}

  .auth-wrap{width:100%;max-width:420px;}

  .auth-logo{text-align:center;margin-bottom:32px;}
  .auth-logo a{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:22px;color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
  .auth-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);}

  .auth-card{background:#fff;border-radius:20px;padding:36px;
    box-shadow:0 8px 48px rgba(13,31,60,.1);border:1px solid rgba(180,210,255,.3);}

  .auth-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:24px;color:var(--ink);margin-bottom:6px;text-align:center;}
  .auth-sub{font-size:14px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.5;}

  /* Google button */
  .btn-google{width:100%;padding:13px 16px;border-radius:12px;
    border:1.5px solid rgba(180,210,255,.5);background:#fff;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;
    transition:.15s;margin-bottom:20px;}
  .btn-google:hover{border-color:var(--acc);background:rgba(0,87,255,.03);}
  .btn-google svg{width:20px;height:20px;flex-shrink:0;}

  .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .divider-line{flex:1;height:1px;background:rgba(180,210,255,.4);}
  .divider-text{font-size:13px;color:var(--mid);}

  /* Form */
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;}
  .form-input{width:100%;padding:12px 14px;border-radius:10px;
    border:1.5px solid rgba(180,210,255,.5);font-size:15px;
    font-family:'DM Sans',sans-serif;color:var(--ink);background:#fff;
    outline:none;transition:.15s;}
  .form-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,87,255,.08);}
  .form-input.error{border-color:#ff4d6d;}

  .btn-primary{width:100%;padding:13px;border-radius:12px;
    background:var(--acc);color:#fff;font-size:15px;font-weight:700;
    border:none;cursor:pointer;transition:.15s;margin-top:6px;
    font-family:'DM Sans',sans-serif;}
  .btn-primary:hover{background:#0048d4;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;}

  .auth-switch{text-align:center;margin-top:20px;font-size:14px;color:var(--mid);}
  .auth-switch a{color:var(--acc);font-weight:600;text-decoration:none;cursor:pointer;}

  .auth-error{padding:10px 14px;border-radius:10px;background:rgba(255,77,109,.06);
    border:1px solid rgba(255,77,109,.2);font-size:13px;color:#e0003c;
    margin-bottom:14px;display:none;}

  .auth-success{padding:16px;border-radius:12px;background:rgba(0,196,140,.06);
    border:1px solid rgba(0,196,140,.25);font-size:14px;color:#00a374;
    text-align:center;display:none;line-height:1.6;}

  /* Perks below card */
  .auth-perks{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
  .auth-perk{font-size:12px;color:var(--mid);display:flex;align-items:center;gap:5px;}
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <a href="index.html"><span class="auth-logo-dot"></span> Prapp</a>
  </div>

  <div class="auth-card">
    <div class="auth-title" id="authTitle">Create your account</div>
    <div class="auth-sub" id="authSub">Join PMs preparing for Google, Meta, Anthropic.</div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <!-- Google OAuth -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <!-- Email form -->
    <div id="signInForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="emailInput" class="form-input" placeholder="your@email.com"
          onkeydown="if(event.key==='Enter')document.getElementById('passwordInput').focus()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="passwordInput" class="form-input" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')handleAuth()">
      </div>
      <button class="btn-primary" id="authBtn" onclick="handleAuth()">Create Account</button>
      <div class="auth-switch">
        Already have an account? <a onclick="toggleMode()">Sign in</a>
      </div>
    </div>

    <div id="signUpExtra" style="display:none;">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" id="nameInput" class="form-input" placeholder="Your name">
      </div>
    </div>
  </div>

  <div class="auth-perks">
    <div class="auth-perk">🔒 Your scores are private</div>
    <div class="auth-perk">🎤 Practice sessions saved</div>
    <div class="auth-perk">👥 Peer matching enabled</div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// ──────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isSignUp = true;

// Check if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    const redirect = sessionStorage.getItem('authRedirect') || 'prep.html';
    sessionStorage.removeItem('authRedirect');
    window.location.href = redirect;
  }
});

// Handle Google OAuth callback
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    const redirect = sessionStorage.getItem('authRedirect') || 'prep.html';
    sessionStorage.removeItem('authRedirect');
    window.location.href = redirect;
  }
});

async function signInWithGoogle() {
  showError('');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/prep.html' }
  });
  if (error) showError(error.message);
}

async function handleAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('authBtn');

  if (!email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

  btn.disabled = true;
  btn.textContent = isSignUp ? 'Creating account...' : 'Signing in...';
  showError('');

  if (isSignUp) {
    const name = document.getElementById('nameInput')?.value?.trim() || '';
    const { error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) { showError(error.message); }
    else {
      document.getElementById('authSuccess').style.display = 'block';
      document.getElementById('authSuccess').innerHTML =
        '✦ Check your email to confirm your account.<br><span style="font-size:12px;opacity:.7">Then come back and sign in.</span>';
    }
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showError(error.message === 'Invalid login credentials'
      ? 'Wrong email or password.' : error.message);
  }

  btn.disabled = false;
  btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
}

function toggleMode() {
  isSignUp = !isSignUp;
  showError('');
  document.getElementById('authTitle').textContent = isSignUp ? 'Create your account' : 'Sign in';
  document.getElementById('authSub').textContent = isSignUp
    ? 'Join PMs preparing for Google, Meta, Anthropic.'
    : 'Sign in to access your practice history and peer matches.';
  document.getElementById('authBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.querySelector('.auth-switch').innerHTML = isSignUp
    ? 'Already have an account? <a onclick="toggleMode()">Sign in</a>'
    : 'No account? <a onclick="toggleMode()">Create one — it\'s free</a>';

  const extra = document.getElementById('signUpExtra');
  if (isSignUp) {
    // Insert name field before email
    extra.style.display = 'block';
    document.getElementById('signInForm').prepend(extra);
  } else {
    extra.style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
